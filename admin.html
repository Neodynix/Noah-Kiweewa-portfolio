<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Premiere Real Estate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Login Screen -->
        <div id="login-screen">
            <div class="login-box">
                <h1>Admin Login</h1>
                <p>Premiere Real Estate</p>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button onclick="login()">Login</button>
                <div id="login-error" class="error"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <header class="admin-header">
                <div class="logo">
                    <i class="fas fa-home"></i>
                    <span>Premiere Real Estate</span>
                </div>
                <div>
                    <span id="admin-email"></span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="toolbar">
                    <h2>Properties</h2>
                    <button onclick="showAddModal()" class="add-btn">
                        <i class="fas fa-plus"></i> Add New Property
                    </button>
                </div>

                <table id="properties-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Location</th>
                            <th>Price</th>
                            <th>Type</th>
                            <th>Sold</th>
                            <th>Images</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- Modal -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title">Add Property</h2>
                <form id="property-form">
                    <input type="hidden" id="edit-id">
                    
                    <label>Title</label>
                    <input type="text" id="title" required>

                    <label>Location</label>
                    <input type="text" id="location" required>

                    <label>Price</label>
                    <input type="text" id="price" placeholder="UGX 850,000,000" required>

                    <label>Type</label>
                    <select id="type" required>
                        <option value="residential">Residential</option>
                        <option value="apartment">Apartment</option>
                        <option value="land">Land</option>
                        <option value="commercial">Commercial</option>
                    </select>

                    <label>Description</label>
                    <textarea id="description" rows="4"></textarea>

                    <label>Images (multiple allowed)</label>
                    <input type="file" id="images" accept="image/*" multiple>
                    <div id="image-preview" class="preview"></div>

                    <label class="checkbox-label">
                        <input type="checkbox" id="is_sold"> Mark as Sold
                    </label>

                    <div class="modal-buttons">
                        <button type="button" onclick="hideModal()">Cancel</button>
                        <button type="submit">Save Property</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="scripts/auth.js"></script>
    <script type="module" src="scripts/properties.js"></script>
    <script type="module" src="scripts/admin.js"></script>
</body>
</html>
